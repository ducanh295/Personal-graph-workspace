<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PKG - Page Not Found</title>
    <link rel="stylesheet" href="style.css" />
    <script src="theme.js" defer></script>
  </head>
  <body>
    <main class="not-found-page">
      <section class="not-found-card" aria-labelledby="not-found-title">
        <p class="badge">Personal Knowledge Graph</p>
        <h1 id="not-found-title" class="not-found-code">404</h1>
        <p class="not-found-message">
          Không tìm thấy trang bạn yêu cầu. Có thể liên kết đã bị thay đổi hoặc ghi
          chú đã được di chuyển trong graph của bạn.
        </p>
        <a href="index.html" class="btn btn--primary">Quay lại Dashboard</a>
      </section>
    </main>
  </body>
</html>
